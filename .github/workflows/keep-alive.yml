name: Keep Render services awake

on:
  schedule:
    # Every 10 minutes - safely under Render free tier's ~15 minute idle
    # spin-down threshold. GitHub may delay scheduled runs slightly under
    # load, so 10 minutes leaves margin rather than cutting it at 14-15.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf -o /dev/null -m 30 https://pa-copilot-backend.onrender.com/database || true

      - name: Ping frontend
        run: curl -sf -o /dev/null -m 30 https://pa-copilot-frontend.onrender.com/ || true
